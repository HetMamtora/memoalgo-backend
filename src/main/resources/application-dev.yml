spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/memoalgo_dev
    username: memoalgo_user
    password: memoalgo_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    show-sql: true

# JWT — dev-only secret (short, human-readable for debugging)
# Replace with a long random secret in prod
jwt:
  secret: dev-secret-key-replace-this-in-production-with-256-bit-key
  expiration-ms: 86400000       # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

logging:
  level:
    com.memoalgo: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
