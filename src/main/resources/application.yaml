spring:
  application:
    name: memoalgo-backend

  # Active profile set here; override with -Dspring.profiles.active=prod at runtime
  profiles:
    active: dev

  # JPA — DDL is managed by Flyway, never by Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway — runs migrations from db/migration on startup
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Actuator — expose health endpoint only
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.memoalgo: INFO
